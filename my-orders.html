<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>My Orders — Bags Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .order-block {
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 20px;
      margin-bottom: 18px;
      background: var(--cream-card);
    }

    .order-block .head {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .line-item {
      display: flex;
      justify-content: space-between;
      font-size: 13.5px;
      padding: 6px 0;
    }

    .status-chip {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 10px;
      background: var(--canvas);
      border: 1px solid var(--line);
    }
  </style>
</head>

<body>

  <header class="site">
    <div class="header-inner">
      <a href="index.html" class="logo">BAGS HUB</a>
      <nav class="main-nav">
        <ul></ul>
      </nav>
      <div class="header-icons"></div>
    </div>
  </header>

  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Home</a> / My Orders</div>
  </div>
  <div class="page-hero wrap">
    <h1>My Orders</h1>
  </div>

  <div class="wrap" style="padding-bottom:100px;" id="ordersRoot">
    <p style="color:var(--ink-soft);">Loading your orders...</p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function fmt(n) { return "Rs. " + n.toLocaleString(); }

    async function loadOrders(buyerId) {
      const { data, error } = await supabaseClient
        .from("orders")
        .select("*, order_items(*)")
        .eq("buyer_id", buyerId)
        .order("created_at", { ascending: false });

      const root = document.getElementById("ordersRoot");
      if (error) { root.innerHTML = `<p class="form-msg error" style="display:block;">${error.message}</p>`; return; }
      if (!data.length) {
        root.innerHTML = `<div class="empty-state"><h3>No orders yet</h3><p>Everything you buy will show up here.</p><a class="btn btn-dark" href="shop.html" style="margin-top:16px;">Shop All Bags</a></div>`;
        return;
      }

      root.innerHTML = data.map(o => `
    <div class="order-block">
      <div class="head">
        <div><strong>Order #${o.id.slice(0, 8)}</strong><div style="font-size:12px; color:var(--ink-soft);">${new Date(o.created_at).toLocaleDateString()}</div></div>
        <div style="font-weight:700;">${fmt(o.total)}</div>
      </div>
      ${o.order_items.map(item => `
        <div class="line-item">
          <span>${item.product_name} ${item.color ? "· " + item.color : ""} × ${item.qty}</span>
          <span class="status-chip">${item.status}</span>
        </div>`).join("")}
    </div>`).join("");
    }

    (async () => {
      const session = await porta_requireAuth();
      if (!session) return;
      loadOrders(session.user.id);
    })();
  </script>
</body>

</html>
